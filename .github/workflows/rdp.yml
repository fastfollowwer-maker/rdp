name: Ultimate-1D-Counter-No Script

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
      # -----------------------------------------------------------
      # خطوة 1: تهيئة البيئة وأبعاد الشاشة
      # -----------------------------------------------------------
      - name: Configure Display Resolution
        shell: pwsh
        run: |
          Write-Host "🖥️ Setting screen resolution to 1920x1080..."
          Set-DisplayResolution -Width 1920 -Height 1080 -Force
          Get-DisplayResolution

      # -----------------------------------------------------------
      # خطوة 2: تثبيت المتصفحات والأدوات الأساسية
      # -----------------------------------------------------------
      - name: Install Google Chrome & Chromium
        shell: pwsh
        run: |
          Write-Host "⬇️ Downloading Google Chrome..."
          Invoke-WebRequest -Uri "https://dl.google.com/chrome/install/latest/chrome_installer.exe" -OutFile "chrome_installer.exe"
          Start-Process -FilePath "chrome_installer.exe" -Args "/silent /install" -Wait
          
          Write-Host "🌐 Installing Chromium via Chocolatey..."
          choco install chromium -y --no-progress

      # -----------------------------------------------------------
      # خطوة 3: تثبيت شبكة Tuxler VPN الحماية والتخطي
      # -----------------------------------------------------------
      - name: Install Tuxler VPN
        shell: pwsh
        run: |
          Write-Host "🔒 Downloading Tuxler VPN (Bypassing Cloudflare)..."
          $tuxlerUrl = "https://www.tuxler.com/downloads/tuxler-setup.exe"
          $userAgent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          
          try {
              # محاولة التحميل بالهوية المحدثة لتجنب حظر الخادم
              Invoke-WebRequest -Uri $tuxlerUrl -UserAgent $userAgent -OutFile "tuxler-setup.exe" -ErrorAction Stop
              Write-Host "✅ Downloaded successfully from official source."
          } catch {
              Write-Host "⚠️ Official source restricted. Fetching from optimized mirror..."
              $mirrorUrl = "https://github.com/it9g/tuxler-mirror/releases/download/v1.0/tuxler-setup.exe"
              Invoke-WebRequest -Uri $mirrorUrl -OutFile "tuxler-setup.exe"
          }

          Write-Host "📦 Launching Silent Installation..."
          Start-Process -FilePath "tuxler-setup.exe" -Args "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
          Write-Host "✅ Tuxler VPN is ready."

      # -----------------------------------------------------------
      # خطوة 4: إعداد وتفعيل الوصول عن بعد (CRD)
      # -----------------------------------------------------------
      - name: Configure Chrome Remote Desktop
        shell: pwsh
        env:
          CRD_CODE: ${{ secrets.CRD_CODE }}
          CRD_PIN: ${{ secrets.CRD_PIN }}
        run: |
          Write-Host "⬇️ Installing Chrome Remote Desktop Host..."
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "crd.msi"
          Start-Process -FilePath "msiexec.exe" -Args "/i crd.msi /quiet /qn" -Wait

          # توليد اسم فريد للآلة بناءً على حساب اليوزر والـ Run ID لمنع تداخل الأسماء
          $UniqueName = "${{ github.actor }}-Machine-${{ github.run_id }}"
          $exePath = "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          
          Write-Host "🚀 Spawning RDP Host Service: $UniqueName"
          & $exePath --code="$env:CRD_CODE" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name="$UniqueName" --pin=$env:CRD_PIN

      # -----------------------------------------------------------
      # خطوة 5: استمرار تشغيل الحاوية / البيئة الافتراضية
      # -----------------------------------------------------------
      - name: Keep Alive Session
        shell: pwsh
        run: |
          Write-Host "🚀 Environment is fully initialized and operational."
          Write-Host "⏳ Entering maintenance loop..."
          while ($true) { Start-Sleep -Seconds 300 }
